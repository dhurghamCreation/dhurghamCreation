name: Sector 7 Protocol Game Engine

on:
  issues:
    types: [opened]

jobs:
  play:
    if: contains(github.event.issue.title, 'ACTION:')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write

    steps:
      - name: Checkout Repository Framework Codebase
        uses: actions/checkout@v4

      - name: Setup Runtime Environments
        uses: actions/setup-python@v5
        with:
          python-python: '3.x'

      - name: Process Move Actions and Calculate Physics
        run: python .github/game/engine.py "${{ github.event.issue.title }}"

      - name: Commit Game Framework Adjustments
        run: |
          git config --global user.name "Sector7-Bot"
          git config --global user.email "actions@github.com"
          git add .github/game/state.json README.md
          git commit -m " Game State Engine Synchronization Patch" || echo "No state shifts tracked."
          git push

      - name: Clear and Close Triggered Action Issue Pipeline
        run: |
          gh issue close ${{ github.event.issue.number }} --comment "Subroutine execution verified. Mainframe updated successfully."
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
